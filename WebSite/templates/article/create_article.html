{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h3 class="text-center mb-4">Create Article</h3>

            <form method="POST"
                  action="{% url 'article:create-article' %}"
                  enctype="multipart/form-data"
                  class="needs-validation"
                  novalidate>

                {% csrf_token %}

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label">Article Title</label>
                    {{ form.title }}
                    <div class="invalid-feedback">
                        Please enter article title
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label">Article Description</label>
                    {{ form.description }}
                    <div class="invalid-feedback">
                        Please enter article description
                    </div>
                </div>

                    <!-- Author -->
                    <div class="mb-3">
                        <label class="form-label">Article Author</label>
                        {{ form.author }}
                        <div class="invalid-feedback">
                            Please select author
                        </div>
                    </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100">
                    Create Article
                </button>

            </form>

        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'authentication_user/css/registration_user.css' %}">

{% endblock %}
