{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">

    <h3 class="text-center mb-4">Article List</h3>

    {% if articles %}
        {% for article in articles %}
            <div class="card mb-3 shadow-sm">
                <div class="card-body">

                    <h5 class="card-title">{{ article.title }}</h5>

                    <p class="card-text">
                        {{ article.description }}
                    </p>

                    <p class="card-text text-muted">
                        Author: {{ article.user }}
                    </p>

                    <div class="d-flex gap-2">
                        <!-- Update Button -->
                        <a href="{% url 'article:update-article' pk=article.pk  %}"
                           class="btn btn-warning btn-sm">
                            Update
                        </a>

                        <!-- Delete Button -->
                        <a href="{% url 'article:delete-article' pk=article.pk  %}"
                           class="btn btn-danger btn-sm">
                            Delete
                        </a>

                        <!-- Detail Button (Optional but recommended) -->
                        <a href="{% url 'article:article-detail' pk=article.pk %}"
                           class="btn btn-primary btn-sm">
                            View
                        </a>
                    </div>

                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-info text-center">
            No articles found.
        </div>
    {% endif %}

</div>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'authentication_user/css/registration_user.css' %}">
{% endblock %}
