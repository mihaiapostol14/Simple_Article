{% extends "base.html" %}
{% load static %}

{% block content %}


<div class="bg-light min-vh-100 d-flex align-items-center justify-content-center">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="contact-card bg-white rounded-4 shadow-sm overflow-hidden">
                    <div class="row g-0">

                        <!-- Left Image Section -->
                        <div class="col-md-4 bg-primary bg-gradient d-flex align-items-center justify-content-center p-4">
                            
                            {% if user.get_photo %}
                                <img src="{{ user.get_photo }}" 
                                     class="rounded-circle shadow-sm" 
                                     width="140" height="140"
                                     style="object-fit: cover;"
                                     alt="Profile Image">
                            {% else %}
                                <img src="{% static 'default_profile.png' %}" 
                                     class="rounded-circle shadow-sm" 
                                     width="140" height="140"
                                     style="object-fit: cover;"
                                     alt="Profile Image">
                            {% endif %}

                        </div>

                        <!-- Right Content Section -->
                        <div class="col-md-8">
                            <div class="card-body p-4">

                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h3 class="card-title mb-0 text-primary fw-bold">
                                        {{ user.username }}
                                    </h3>

                                    <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill">
                                        Member
                                    </span>
                                </div>

                                <p class="card-text text-muted mb-4">
                                    {{ user.email }} <br>
                                    Member since {{ user.date_joined|date:"F Y" }}
                                </p>

                                <!-- Buttons -->
                                <div class="d-flex gap-3 mb-4">
                                    <a href="{% url 'article:article-list' %}" 
                                       class="btn btn-primary px-4 rounded-pill">
                                        <i class="fas fa-newspaper me-2"></i>Articles
                                    </a>

                                    <a href="{% url 'article:create-article' %}" 
                                       class="btn btn-outline-primary px-4 rounded-pill">
                                        <i class="fas fa-plus me-2"></i>Create
                                    </a>
                                </div>

                                <!-- Bottom Section -->
                                <div class="border-top pt-3">
                                    <div class="d-flex justify-content-between align-items-center">

                                        <div class="d-flex gap-3">
                                            <i class="fas fa-file-alt fa-lg text-primary"></i>
                                            <span class="fw-bold">
                                            </span>
                                        </div>

                                        <span class="text-muted small">
                                            <i class="fas fa-id-badge me-2"></i>ID: {{ user.id }}
                                        </span>

                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="{%static 'authentication_user/css/user_profile.css'%}">
<script type="text/javascript" src="{%static 'authentication_user/js/user_profile.js'%}"></script>
{% endblock %}
